version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: smartpg_db
    restart: always
    environment:
      POSTGRES_USER: smartpg_user
      POSTGRES_PASSWORD: smartpg_password
      POSTGRES_DB: smartpg_mess_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartpg_user -d smartpg_mess_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartpg_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://smartpg_user:smartpg_password@db:5432/smartpg_mess_db
      - JWT_SECRET_KEY=a382bbbb8abbd01d85d1f9d726688b53a68fb526d5165a169e8ac3c2c12bfab0
      - MAIL_SERVER=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_USE_TLS=true
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartpg_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
